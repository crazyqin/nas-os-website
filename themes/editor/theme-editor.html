<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义主题 - NAS OS</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../themes/engine/theme-variables.css">
    <style>
        .theme-editor {
            padding: 4rem 0;
            background: var(--bg-secondary);
        }
        
        .editor-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }
        
        .editor-panel {
            background: var(--bg-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow);
        }
        
        .preview-panel {
            background: var(--bg-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 100px;
        }
        
        .editor-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        
        .editor-subtitle {
            color: var(--text-light);
            margin-bottom: 2rem;
        }
        
        .color-group {
            margin-bottom: 2rem;
        }
        
        .color-group h4 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: var(--text-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        
        .color-input {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .color-input label {
            flex: 1;
            color: var(--text-color);
            font-size: 0.875rem;
        }
        
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        input[type="color"] {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            padding: 0;
            background: none;
        }
        
        .color-value {
            font-family: monospace;
            font-size: 0.875rem;
            color: var(--text-light);
            min-width: 80px;
        }
        
        .preview-section {
            margin-bottom: 2rem;
        }
        
        .preview-section h4 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: var(--text-color);
        }
        
        .preview-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .preview-btn {
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .preview-btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .preview-btn-secondary {
            background: var(--secondary-color);
            color: white;
        }
        
        .preview-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .preview-card h5 {
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
        
        .preview-card p {
            color: var(--text-light);
            font-size: 0.875rem;
        }
        
        .editor-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn-save {
            flex: 1;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-save:hover {
            background: var(--primary-hover);
        }
        
        .btn-reset {
            background: var(--bg-secondary);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-reset:hover {
            background: var(--bg-tertiary);
        }
        
        .btn-export {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-export:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">
                <span class="logo-icon">🖥️</span>
                <span>NAS OS</span>
            </a>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="theme-market.html">主题市场</a></li>
                <li><a href="theme-editor.html" style="color: var(--primary-color);">自定义主题</a></li>
            </ul>
        </div>
    </nav>

    <section class="theme-editor">
        <div class="editor-container">
            <div class="editor-panel">
                <h1 class="editor-title">🎨 自定义主题</h1>
                <p class="editor-subtitle">调整颜色，创建属于你的独特主题</p>

                <form id="themeForm">
                    <div class="color-group">
                        <h4>主色调</h4>
                        <div class="color-input">
                            <label>主要颜色</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="primaryColor" value="#3b82f6" data-var="--primary-color">
                                <span class="color-value" id="primaryColorValue">#3b82f6</span>
                            </div>
                        </div>
                        <div class="color-input">
                            <label>悬停颜色</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="primaryHover" value="#2563eb" data-var="--primary-hover">
                                <span class="color-value" id="primaryHoverValue">#2563eb</span>
                            </div>
                        </div>
                    </div>

                    <div class="color-group">
                        <h4>次色调</h4>
                        <div class="color-input">
                            <label>次要颜色</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="secondaryColor" value="#8b5cf6" data-var="--secondary-color">
                                <span class="color-value" id="secondaryColorValue">#8b5cf6</span>
                            </div>
                        </div>
                    </div>

                    <div class="color-group">
                        <h4>背景色</h4>
                        <div class="color-input">
                            <label>主背景</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="bgColor" value="#ffffff" data-var="--bg-color">
                                <span class="color-value" id="bgColorValue">#ffffff</span>
                            </div>
                        </div>
                        <div class="color-input">
                            <label>次要背景</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="bgSecondary" value="#f9fafb" data-var="--bg-secondary">
                                <span class="color-value" id="bgSecondaryValue">#f9fafb</span>
                            </div>
                        </div>
                    </div>

                    <div class="color-group">
                        <h4>文字颜色</h4>
                        <div class="color-input">
                            <label>主要文字</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="textColor" value="#1f2937" data-var="--text-color">
                                <span class="color-value" id="textColorValue">#1f2937</span>
                            </div>
                        </div>
                        <div class="color-input">
                            <label>次要文字</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="textLight" value="#6b7280" data-var="--text-light">
                                <span class="color-value" id="textLightValue">#6b7280</span>
                            </div>
                        </div>
                    </div>

                    <div class="editor-actions">
                        <button type="button" class="btn-reset" onclick="resetToDefault()">↺ 重置</button>
                        <button type="button" class="btn-export" onclick="exportTheme()">📥 导出</button>
                        <button type="submit" class="btn-save">💾 保存主题</button>
                    </div>
                </form>
            </div>

            <div class="preview-panel">
                <h4 style="margin-bottom: 1.5rem; color: var(--text-color);">实时预览</h4>
                
                <div class="preview-section">
                    <h5>按钮样式</h5>
                    <div class="preview-buttons">
                        <button class="preview-btn preview-btn-primary">主要按钮</button>
                        <button class="preview-btn preview-btn-secondary">次要按钮</button>
                    </div>
                </div>

                <div class="preview-section">
                    <h5>卡片样式</h5>
                    <div class="preview-card">
                        <h5 style="color: var(--primary-color);">卡片标题</h5>
                        <p>这是卡片的描述文字，展示文字颜色和背景色的搭配效果。</p>
                    </div>
                </div>

                <div class="preview-section">
                    <h5>边框样式</h5>
                    <div style="border: 2px solid var(--border-color); padding: 1rem; border-radius: var(--radius);">
                        <p style="color: var(--text-light); font-size: 0.875rem;">边框和圆角效果预览</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p class="footer-text">© 2024 NAS OS. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../themes/engine/theme-engine.js"></script>
    <script>
        const colorInputs = document.querySelectorAll('input[type="color"]');
        const form = document.getElementById('themeForm');

        // 初始化：从当前主题加载颜色值
        function loadCurrentTheme() {
            const currentThemeName = localStorage.getItem('nas-os-theme') || 'default';
            const root = getComputedStyle(document.documentElement);
            
            colorInputs.forEach(input => {
                const cssVar = input.dataset.var;
                const value = root.getPropertyValue(cssVar).trim();
                if (value) {
                    input.value = value;
                    updateValueDisplay(input);
                }
            });
        }

        // 更新颜色值显示
        function updateValueDisplay(input) {
            const valueSpan = document.getElementById(`${input.id}Value`);
            if (valueSpan) {
                valueSpan.textContent = input.value;
            }
        }

        // 应用颜色更改
        function applyColor(cssVar, value) {
            document.documentElement.style.setProperty(cssVar, value);
        }

        // 监听颜色变化
        colorInputs.forEach(input => {
            input.addEventListener('input', (e) => {
                const cssVar = e.target.dataset.var;
                const value = e.target.value;
                applyColor(cssVar, value);
                updateValueDisplay(e.target);
            });
        });

        // 保存主题
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const themeName = prompt('请输入主题名称:', 'my-custom-theme');
            if (!themeName) return;

            const themeData = {
                name: themeName,
                displayName: themeName.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
                description: '自定义主题',
                author: 'User',
                version: '1.0.0',
                variables: {}
            };

            colorInputs.forEach(input => {
                themeData.variables[input.dataset.var] = input.value;
            });

            // 保存到 localStorage
            const customThemes = JSON.parse(localStorage.getItem('nas-os-custom-themes') || '{}');
            customThemes[themeName] = themeData;
            localStorage.setItem('nas-os-custom-themes', JSON.stringify(customThemes));

            // 应用主题
            window.ThemeEngine.registerTheme(themeName, {
                variables: themeData.variables,
                displayName: themeData.displayName,
                description: themeData.description
            });
            window.ThemeEngine.applyTheme(themeName);

            alert('主题已保存！');
        });

        // 重置为默认
        function resetToDefault() {
            if (confirm('确定要重置为默认颜色吗？')) {
                loadCurrentTheme();
                window.ThemeEngine.resetToDefault();
            }
        }

        // 导出主题
        function exportTheme() {
            const themeData = {};
            colorInputs.forEach(input => {
                themeData[input.dataset.var] = input.value;
            });

            const blob = new Blob([JSON.stringify({
                name: 'custom-theme',
                displayName: '自定义主题',
                variables: themeData
            }, null, 2)], { type: 'application/json' });
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'custom-theme.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', loadCurrentTheme);
    </script>
</body>
</html>
